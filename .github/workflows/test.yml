name: test

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  agent-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci --omit=optional --no-audit --no-fund

      - name: Run agent-runtime tests
        run: node --test tests/agents/

      - name: Run path-safety fuzzer
        run: node --test tests/agents/fuzz-paths.test.mjs

      - name: Verify context-snapshot drift
        run: |
          node --test tests/agents/context-snapshots.test.mjs
          if [ -n "$(git status --porcelain tests/agents/fixtures/context-snapshots/)" ]; then
            echo "::error::Context snapshots drifted. Run UPDATE_SNAPSHOTS=1 node --test tests/agents/context-snapshots.test.mjs and commit."
            git diff tests/agents/fixtures/context-snapshots/
            exit 1
          fi

      - name: Verify audit chain (if present)
        run: |
          if [ -f logs/audit.log ]; then
            node cli/kb.js agent verify-audit
          else
            echo "no audit.log committed (expected)"
          fi

      - name: Tier read-leak audit (strict)
        run: |
          if [ -f scripts/audit-context-leaks.mjs ]; then
            # Strict: any cross-tier read not declared in the contract's
            # `context_policy.permitted_cross_tier_reads` allowlist fails CI.
            node scripts/audit-context-leaks.mjs --strict --verbose
          else
            echo "tier-leak audit script not yet present"
          fi

      - name: Static wiki lint (orphans/stale) — report-only
        run: |
          if [ -f scripts/static-lint.mjs ]; then
            node scripts/static-lint.mjs --top 0
          else
            echo "static-lint script not yet present"
          fi

      - name: KB health snapshot (advisory)
        if: always()
        run: |
          if grep -q "'health'" cli/kb.js 2>/dev/null; then
            node cli/kb.js health || true
          fi
